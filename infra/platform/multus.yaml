apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multus
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/k8snetworkplumbingwg/multus-cni.git
    targetRevision: v4.1.0
    path: deploy

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true