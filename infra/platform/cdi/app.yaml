apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cdi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/kubevirt/containerized-data-importer
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: cdi
  syncPolicy:
    automated: {}