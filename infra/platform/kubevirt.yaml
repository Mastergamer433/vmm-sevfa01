apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubevirt
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/kubevirt/kubevirt.git
    targetRevision: v1.2.0
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: kubevirt

  syncPolicy:
    automated:
      prune: true
      selfHeal: true