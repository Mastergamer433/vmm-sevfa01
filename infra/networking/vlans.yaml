apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vlans
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Mastergamer433/vmm-sevfa01.git
    targetRevision: master
    path: infra/networking/vlans

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true